name: poll-prices

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:
    inputs:
      test_ping:
        description: "Send a wiring-test notification instead of polling"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Poll prices
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          TEST_PING: ${{ inputs.test_ping }}
        run: python3 poll_prices.py

      - name: Commit state
        run: |
          if ! git diff --quiet state.json; then
            git config user.name "price-watch-bot"
            git config user.email "actions@users.noreply.github.com"
            git add state.json
            git commit -m "state: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
